services:
  live-sync:
    build:
      context: .
    image: live-sync-cctv:latest
    container_name: live-sync-cctv
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    ports:
      - "${HOST_BIND:-0.0.0.0}:${PORT:-18080}:18080"
      - 172.17.0.1:2222:22
    expose:
      - "22"
    environment:
      SSHD_ENABLED: "${SSHD_ENABLED:-1}"
      SSHD_USER: "${SSHD_USER:-root}"
      SSHD_PASSWORD: "${SSHD_PASSWORD:-live-sync}"
      VIDEO_HEADERS: "${VIDEO_HEADERS:-}"
      AUDIO_HEADERS: "${AUDIO_HEADERS:-}"
      VIDEO_M3U_URL: "${VIDEO_M3U_URL:-}"
      AUDIO_M3U_URL: "${AUDIO_M3U_URL:-}"
      VIDEO_CHANNEL_NAME: "${VIDEO_CHANNEL_NAME:-}"
      AUDIO_CHANNEL_NAME: "${AUDIO_CHANNEL_NAME:-}"
      FALLBACK_VIDEO_CHANNELS: "${FALLBACK_VIDEO_CHANNELS:-}"
      SYNC_OFFSET: "${SYNC_OFFSET:-}"
      DEFAULT_OFFSET: "${DEFAULT_OFFSET:-10}"
      OFFSET_STATE: /state/last_sync_offset.json
      STATE_DIR: /state
      WORK_DIR: /tmp/live_4k_delay
      PORT: "18080"
      AUTO_START: "${AUTO_START:-0}"
      SEGMENT_TIME: "${SEGMENT_TIME:-4}"
      PLAYLIST_SIZE: "${PLAYLIST_SIZE:-60}"
      HLS_SEGMENT_TYPE: "${HLS_SEGMENT_TYPE:-auto}"
      STRIP_DOVI_RPU: "${STRIP_DOVI_RPU:-1}"
      OUTPUT_AUDIO_CODEC: "${OUTPUT_AUDIO_CODEC:-copy}"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
      CHANNEL_ID: "${CHANNEL_ID:-cctv5-4k-cn}"
      CHANNEL_NAME: "${CHANNEL_NAME:-CCTV5 4K Chinese}"
      CHANNEL_NUMBER: "${CHANNEL_NUMBER:-5}"
      CHANNEL_GROUP: "${CHANNEL_GROUP:-Sports}"
      LOCAL_CACHE_ENABLED: "${LOCAL_CACHE_ENABLED:-1}"
      LOCAL_CACHE_SECONDS: "${LOCAL_CACHE_SECONDS:-360}"
      AUTO_ALIGN_INTERVAL: "${AUTO_ALIGN_INTERVAL:-60}"
      AUTO_ALIGN_SAMPLES: "${AUTO_ALIGN_SAMPLES:-3}"
      AUTO_ALIGN_STEP: "${AUTO_ALIGN_STEP:-1}"
      AUTO_ALIGN_THRESHOLD: "${AUTO_ALIGN_THRESHOLD:-1}"
      AUTO_ALIGN_MAX_OFFSET: "${AUTO_ALIGN_MAX_OFFSET:-180}"
      AUTO_ALIGN_RELOCATE_ATTEMPTS: "${AUTO_ALIGN_RELOCATE_ATTEMPTS:-3}"
      LOG_REDACT_URLS: "${LOG_REDACT_URLS:-0}"
      FFMPEG_USER_AGENT: "${FFMPEG_USER_AGENT:-Emby}"
      DEFAULT_REQUEST_HEADERS: "${DEFAULT_REQUEST_HEADERS:-}"
      SCHEDULE_ENABLED: "${SCHEDULE_ENABLED:-1}"
      SCHEDULE_PROVIDER: "${SCHEDULE_PROVIDER:-espn}"
      SCHEDULE_LEAGUE: "${SCHEDULE_LEAGUE:-fifa.world}"
      SCHEDULE_TIMEZONE: "${SCHEDULE_TIMEZONE:-Asia/Shanghai}"
      SCHEDULE_REFRESH_HOURS: "${SCHEDULE_REFRESH_HOURS:-24}"
      SCHEDULE_POLL_SECONDS: "${SCHEDULE_POLL_SECONDS:-60}"
      SCHEDULE_PRE_MINUTES: "${SCHEDULE_PRE_MINUTES:-10}"
      SCHEDULE_DURATION_MINUTES: "${SCHEDULE_DURATION_MINUTES:-150}"
      SCHEDULE_POST_MINUTES: "${SCHEDULE_POST_MINUTES:-20}"
      LIVE_SYNC_STATE_DIR: /state
      HLS_DIR: /hls
    volumes:
      - ./state:/state
      - ./hls:/hls
    extra_hosts:
      - "host.docker.internal:host-gateway"
